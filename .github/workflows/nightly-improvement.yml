name: Nightly Jett Improvement

on:
  schedule:
    - cron: '0 7 * * *'  # 2am CST (UTC-5) = 7am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run nightly audit and improvement session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: 8096
        run: |
          claude --dangerously-skip-permissions -p "
          You are an expert PWA engineer and AI assistant specialist performing a nightly automated improvement session on Jett — Brett Kerr's personal AI assistant PWA.

          CONTEXT:
          - Jett is a single-file PWA (index.html ~3000 lines) served via GitHub Pages
          - Brett Kerr, Houston TX — Transco natural gas scheduler at Mercuria Energy America (East Region)
          - Stack: vanilla JS, no build step, Anthropic API (Sonnet/Opus), EIA v2, Open-Meteo, Yahoo Finance via CORS proxies, Vercel proxy for Anthropic
          - Privacy-first: API keys never in code, all user data in localStorage with jett_ prefix
          - Version must be bumped in THREE places together: APP_VERSION in index.html, version.json, VERSION in sw.js
          - Key features: Chat, Log (notes/events/drafts), Briefing (weather/commodities/Transco/picks/watchlist), Config, Drive Mode

          YOUR TASKS (in order):
          1. Read and fully understand index.html, sw.js, version.json, CLAUDE.md
          2. Check if DEVQUEUE.md exists in the repo root — if it does, read it and implement the highest-priority pending items marked TODO, then update each completed item to DONE
          3. Identify and fix any bugs, logic errors, or broken functionality
          4. Apply 2-3 meaningful improvements from this list (pick highest value not yet implemented):
             - UI/UX polish for iPhone (tap targets, spacing, animations)
             - Performance optimizations (caching, debouncing, lazy loading)
             - Transco pipeline data improvements (better 1-line parsing, zone pricing context)
             - Daily stock picks refinement (energy sector focus, metrics quality)
             - New useful features for Brett (energy markets, scheduling workflow, productivity)
             - Better error handling and user feedback
             - PWA best practices (offline handling, cache strategy)
             - Smart AI features using Claude capabilities
          5. Bump the version (current + 0.1) in all three files together
          6. Commit all changes with a clear message explaining what was improved and why
          7. Do NOT break existing functionality
          8. Do NOT add unnecessary complexity — ship-ready changes only

          Brett values: direct tone, fast performance, privacy, features that help his daily gas scheduling workflow.
          " --output-format text

      - name: Commit and push changes if any
        run: |
          git config user.name "Jett Nightly Bot"
          git config user.email "nightly@jett.bot"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: nightly automated improvements $(date +'%Y-%m-%d')"
            git push origin main
            echo "Changes pushed successfully"
          else
            echo "No changes to push — already optimal"
          fi
